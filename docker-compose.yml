version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: ../backend/Dockerfile # Assuming a root Dockerfile for backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=dev

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
